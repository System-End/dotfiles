#!/usr/sbin/nft -f
# Mullvad + Tailscale coexistence (legacy one-shot rules).
# Prefer the maintained path:
#   /home/end/.local/bin/mullvad-tailscale-fix
# with systemd timer:
#   mullvad-tailscale-fix.timer
#
# If you still use this file manually, run:
#   sudo nft -f /home/end/Github/dotfiles/mullvad_tailscale.conf
#   sudo ip route replace 100.64.0.0/10 dev tailscale0 table main

table inet mullvad_tailscale {
  chain output {
    type route hook output priority 0; policy accept;
    ip daddr 100.64.0.0/10 ct mark set 0x00000f41 meta mark set 0x6d6f6c65;
  }
  chain input {
    type filter hook input priority -100; policy accept;
    ip saddr 100.64.0.0/10 ct mark set 0x00000f41 meta mark set 0x6d6f6c65;
  }
}
